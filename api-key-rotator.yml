name: Sovereign Key Rotation (Entry 632)

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rotation'
        required: false
        default: false
        type: boolean
      count:
        description: 'Number of rotations'
        required: false
        default: 1
        type: number

permissions:
  id-token: write
  contents: read

jobs:
  rotate:
    runs-on: ubuntu-latest
    name: Key Rotation (Entry 632)
    outputs:
      rotation_count: ${{ steps.rotate.outputs.rotation_count }}
      current_fingerprint: ${{ steps.rotate.outputs.current_fingerprint }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/sovereign-rotator-632
          aws-region: us-east-1
          role-duration-seconds: 900

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install boto3

      - name: Rotate Keys
        id: rotate
        run: |
          python ci_cd_key_rotator.py
        env:
          SECRET_NAME: "sovereign-hamiltonian-hmac-632"
          AWS_REGION: "us-east-1"
          FORCE_ROTATE: ${{ github.event.inputs.force || 'false' }}
          ROTATE_COUNT: ${{ github.event.inputs.count || 1 }}

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: rotation-report
          path: rotation_report.json
          retention-days: 90
