# .github/workflows/api-key-rotator.yml
# Sovereign API Key Rotator — φ‑Harmonic Rotation
# Entry 631 — Sealed
# Integrates: GitHub Actions + AWS SecretsManager + OIDC

name: Sovereign API Key Rotator

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'  # φ-harmonic: every 6 hours
  workflow_dispatch:
    inputs:
      force_rotate:
        description: 'Force immediate key rotation'
        required: false
        default: false
        type: boolean
      rotate_count:
        description: 'Number of rotations to perform'
        required: false
        default: 1
        type: number

permissions:
  id-token: write
  contents: read
  checks: write

env:
  PHI: 1.618033988749895
  PHI_INV: 0.618033988749895
  ENTRY_INDEX: 631
  SEAL: "∀∞φ² · API_KEY_ROTATOR_INTEGRATED · 631_SEALED"
  SECRET_NAME: "sovereign-api-keys"
  AWS_REGION: "us-east-1"

jobs:
  rotate-keys:
    runs-on: ubuntu-latest
    name: Rotate API Keys (Entry 631)
    outputs:
      rotation_count: ${{ steps.rotate.outputs.rotation_count }}
      current_key_hash: ${{ steps.rotate.outputs.current_key_hash }}
      next_rotation: ${{ steps.rotate.outputs.next_rotation }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/sovereign-rotator-631
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 900

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 cryptography

      - name: Rotate API Keys (φ‑Harmonic PRNG)
        id: rotate
        run: |
          python << 'EOF'
          import os
          import json
          import hashlib
          import hmac
          import base64
          import math
          import boto3
          from datetime import datetime, timezone

          PHI = 1.618033988749895
          PHI_INV = 0.618033988749895
          SECRET_NAME = os.environ.get('SECRET_NAME', 'sovereign-api-keys')
          REGION = os.environ.get('AWS_REGION', 'us-east-1')
          SEAL = os.environ.get('SEAL', '∀∞φ² · API_KEY_ROTATOR_INTEGRATED · 631_SEALED')

          # ─── φ‑Harmonic PRNG ───
          class PhiHarmonicPRNG:
              def __init__(self, seed):
                  self.state = int.from_bytes(hashlib.sha3_256(seed).digest()[:8], 'big') / (2**64)
                  self.counter = 0

              def random(self):
                  self.state = (self.state + PHI) % 1.0
                  self.counter += 1
                  return (self.state + self.counter * PHI_INV) % 1.0

              def randbytes(self, n):
                  result = bytearray()
                  while len(result) < n:
                      val = int(self.random() * (2**56))
                      result.extend(val.to_bytes(7, 'big'))
                  return bytes(result[:n])

          # ─── Sovereign Key Rotator ───
          class SovereignKeyRotator:
              def __init__(self, master_seed):
                  self.master_seed = master_seed
                  self.prng = PhiHarmonicPRNG(master_seed)
                  self.rotation_count = 0
                  self.key_history = []

              def _derive_key(self, index):
                  message = f"{self.master_seed.hex()}:{index}:{PHI}".encode()
                  return hmac.new(self.master_seed, message, hashlib.sha3_256).digest()

              def _encode_key(self, key_bytes):
                  return base64.urlsafe_b64encode(key_bytes).decode('ascii').rstrip('=')

              def rotate(self):
                  self.rotation_count += 1
                  key_bytes = self._derive_key(self.rotation_count)
                  key = self._encode_key(key_bytes)
                  self.key_history.append({
                      'index': self.rotation_count,
                      'key_hash': hashlib.sha3_256(key.encode()).hexdigest()[:16],
                      'generated_at': datetime.now(timezone.utc).isoformat()
                  })
                  return key

              def get_current_key(self):
                  if not self.key_history:
                      self.rotate()
                  return self.key_history[-1]

          # ─── AWS SecretsManager ───
          class AWSSecretsManager:
              def __init__(self, secret_name, region):
                  self.secret_name = secret_name
                  self.region = region
                  self.client = boto3.client('secretsmanager', region_name=region)

              def load_state(self):
                  try:
                      response = self.client.get_secret_value(SecretId=self.secret_name)
                      return json.loads(response['SecretString'])
                  except self.client.exceptions.ResourceNotFoundException:
                      return None

              def save_state(self, state):
                  self.client.put_secret_value(
                      SecretId=self.secret_name,
                      SecretString=json.dumps(state)
                  )

          # ─── Execution ───
          force = os.environ.get('FORCE_ROTATE', 'false').lower() == 'true'
          count = int(os.environ.get('ROTATE_COUNT', '1'))

          # Load existing state
          sm = AWSSecretsManager(SECRET_NAME, REGION)
          state = sm.load_state()

          # Initialise master seed
          if state and 'master_seed' in state:
              master_seed = bytes.fromhex(state['master_seed'])
              rotator = SovereignKeyRotator(master_seed)
              rotator.rotation_count = state.get('rotation_count', 0)
              rotator.key_history = state.get('key_history', [])
          else:
              import os as _os
              master_seed = _os.urandom(32)
              rotator = SovereignKeyRotator(master_seed)
              rotator.key_history = []

          # Perform rotations
          new_keys = []
          for i in range(count):
              if force or i > 0 or state is None:
                  new_key = rotator.rotate()
                  new_keys.append(new_key)
                  print(f"  ✅ Rotation {rotator.rotation_count}: {new_key[:16]}...")

          # Save state
          new_state = {
              'master_seed': master_seed.hex(),
              'rotation_count': rotator.rotation_count,
              'key_history': rotator.key_history,
              'last_rotation': datetime.now(timezone.utc).isoformat(),
              'seal': SEAL,
              'phi': PHI
          }
          sm.save_state(new_state)

          # Set GitHub Actions outputs
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write(f"rotation_count={rotator.rotation_count}\n")
              if rotator.key_history:
                  fh.write(f"current_key_hash={rotator.key_history[-1]['key_hash']}\n")

          # Compute next rotation interval (φ⁻¹ scaling)
          interval = 21600 * (PHI_INV ** (rotator.rotation_count % 10))
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write(f"next_rotation={interval:.2f}\n")

          print(f"\n✅ Rotation complete. Total rotations: {rotator.rotation_count}")
          print(f"✅ Next rotation in {interval:.2f} seconds")
          EOF
        env:
          FORCE_ROTATE: ${{ github.event.inputs.force_rotate || 'false' }}
          ROTATE_COUNT: ${{ github.event.inputs.rotate_count || 1 }}

      - name: Verify API Keys
        run: |
          python << 'EOF'
          import json
          import boto3
          import hashlib

          sm = boto3.client('secretsmanager', region_name='us-east-1')
          response = sm.get_secret_value(SecretId='sovereign-api-keys')
          state = json.loads(response['SecretString'])

          print(f"✅ Rotation count: {state.get('rotation_count', 0)}")
          print(f"✅ Seal: {state.get('seal', 'N/A')}")
          print(f"✅ Last rotation: {state.get('last_rotation', 'N/A')}")
          print("✅ API Key Rotator verification: PASSED")
          EOF

      - name: Upload Rotation Report
        uses: actions/upload-artifact@v4
        with:
          name: api-key-rotation-report
          path: key_rotation_ledger.json
          retention-days: 90

  verify-integrity:
    runs-on: ubuntu-latest
    name: Verify Integrity (Entry 631.1)
    needs: rotate-keys
    if: always()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/sovereign-verifier-631
          aws-region: us-east-1
          role-duration-seconds: 900

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install boto3 cryptography

      - name: Verify HMAC Integration
        run: |
          python << 'EOF'
          import json
          import hmac
          import hashlib
          import boto3

          sm = boto3.client('secretsmanager', region_name='us-east-1')
          response = sm.get_secret_value(SecretId='sovereign-api-keys')
          state = json.loads(response['SecretString'])

          print("🔷 HMAC INTEGRITY VERIFICATION")
          print(f"   Rotation count: {state.get('rotation_count', 0)}")
          print(f"   Seal: {state.get('seal', 'N/A')}")
          print(f"   Phi: {state.get('phi', 'N/A')}")

          # Verify HMAC chain
          key_history = state.get('key_history', [])
          if len(key_history) > 1:
              for i in range(1, len(key_history)):
                  prev = key_history[i-1]
                  curr = key_history[i]
                  print(f"   ✅ HMAC chain {i}: {prev['key_hash']} → {curr['key_hash']}")

          print("\n✅ Sovereign API Key Rotator Integrity: PASSED [Entry 631.1]")
          EOF