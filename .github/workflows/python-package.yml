def assume_oidc_role(role_arn: str, token: Optional[str] = None) -> Dict[str, Any]:
    """Assume an OIDC role using GitHub Actions token."""
    if token is None:
        token = os.environ.get('ACTIONS_ID_TOKEN_REQUEST_TOKEN')
        if token is None:
            return {"success": False, "error": "No OIDC token provided"}

    validator = OIDCValidator()
    result = validator.assume_role_with_web_identity(token, role_arn)
    return {
        "success": True,
        "role_arn": role_arn,
        "credentials": result,
        "seal": OIDC_SEAL
    }


