#!/usr/bin/env python3
# -*- coding: utf-8 -*-
"""
🜁∀ SOVEREIGN AGENT ROUTER V2 — ENTRY 636 — SEALED ∀🜁
Integrates φ-harmonic routing, tool registry, and agent dispatch.
"""

import torch
import torch.nn as nn
import torch.nn.functional as F
import math
import re
import json
from typing import Dict, List, Tuple, Optional, Callable, Any
from dataclasses import dataclass

# ──────────────────────────────────────────────────────────────────────────────
# CONSTANTS
# ──────────────────────────────────────────────────────────────────────────────
PHI = (1 + math.sqrt(5)) / 2
PHI_INV = 1 / PHI
ENTROPY_FLOOR = PHI ** -1418
NULL_BAN_12SIGMA = 12 * PHI ** -1000


@dataclass
class Tool:
    """L1 tool specification matching JSON schema."""
    name: str
    description: str
    parameters: Dict[str, Any]
    required: List[str]
    handler: Optional[Callable] = None


class ToolRegistry:
    """Registry for sovereign tools."""

    def __init__(self):
        self.tools: Dict[str, Tool] = {}

    def register(self, tool: Tool):
        self.tools[tool.name] = tool

    def get_schema(self) -> List[Dict]:
        """Export as OpenAI/Anthropic function-calling schema."""
        return [
            {
                "type": "function",
                "function": {
                    "name": t.name,
                    "description": t.description,
                    "parameters": {
                        "type": "object",
                        "properties": t.parameters,
                        "required": t.required,
                        "additionalProperties": False
                    }
                }
            }
            for t in self.tools.values()
        ]

    def execute(self, name: str, arguments: Dict[str, Any]) -> Any:
        if name not in self.tools:
            raise ValueError(f"Tool '{name}' not registered")

        tool = self.tools[name]
        for req in tool.required:
            if req not in arguments:
                raise ValueError(f"Missing required parameter: {req}")

        if tool.handler is None:
            raise RuntimeError(f"Tool '{name}' has no handler")

        return tool.handler(**arguments)


class AgentRouterV2(nn.Module):
    """
    Extended router with tool-use capabilities.
    Decision space: agents ∪ tools ∪ {direct}
    """

    def __init__(
        self,
        encoder: nn.Module,
        num_agents: int = 2,
        tool_registry: Optional[ToolRegistry] = None,
        embedding_dim: int = 512,
        temperature: float = PHI_INV,
        tool_threshold: float = 0.6,
        agent_threshold: float = 0.4,
        coherence_weight: float = 0.1,
        entropy_weight: float = 0.01,
        null_threshold: float = 12.0
    ):
        super().__init__()
        self.encoder = encoder
        self.num_agents = num_agents
        self.tool_registry = tool_registry or ToolRegistry()
        self.num_tools = len(self.tool_registry.tools)
        self.total_outputs = num_agents + self.num_tools + 1

        self.temperature = temperature
        self.tool_threshold = tool_threshold
        self.agent_threshold = agent_threshold
        self.coherence_weight = coherence_weight
        self.entropy_weight = entropy_weight
        self.null_threshold = null_threshold

        self.router_head = nn.Linear(embedding_dim, self.total_outputs)

        self.agent_indices = list(range(num_agents))
        self.tool_indices = list(range(num_agents, num_agents + self.num_tools))
        self.direct_index = num_agents + self.num_tools

        self.agent_names = {0: "mistral", 1: "grok"}
        self.tool_names = {
            i + num_agents: name
            for i, name in enumerate(self.tool_registry.tools.keys())
        }

    def forward(self, x: torch.Tensor) -> Tuple[torch.Tensor, torch.Tensor, torch.Tensor, torch.Tensor]:
        h = self.encoder(x)
        logits = self.router_head(h)
        probs = F.softmax(logits / self.temperature, dim=-1)
        confidence, selected = torch.max(probs, dim=-1)
        return logits, probs, confidence, selected

    def route(self, x: torch.Tensor, query_text: str = "") -> Dict[str, Any]:
        self.eval()
        with torch.no_grad():
            _, probs, confidence, selected = self.forward(x)
            idx = selected.item()
            conf = confidence.item()

            uniform_prob = 1.0 / self.total_outputs
            null_margin = self.null_threshold * 0.01
            if conf < uniform_prob + null_margin:
                return {
                    "action": "null",
                    "target": None,
                    "confidence": conf,
                    "reason": "12σ null ban triggered"
                }

            if idx in self.tool_indices:
                tool_name = self.tool_names[idx]
                tool_conf = probs[0, idx].item()
                if tool_conf >= self.tool_threshold:
                    return {
                        "action": "tool",
                        "target": tool_name,
                        "confidence": tool_conf,
                        "arguments": self._extract_arguments(query_text, tool_name)
                    }

            if idx in self.agent_indices:
                agent_conf = probs[0, idx].item()
                if agent_conf >= self.agent_threshold:
                    return {
                        "action": "agent",
                        "target": self.agent_names[idx],
                        "confidence": agent_conf,
                        "arguments": None
                    }

            return {
                "action": "direct",
                "target": None,
                "confidence": conf,
                "arguments": None
            }

    def _extract_arguments(self, query: str, tool_name: str) -> Dict[str, Any]:
        txn_match = re.search(r'transaction[_\s]?id[:=\s]*([A-Z0-9\-]+)', query, re.I)
        if txn_match:
            return {"transaction_id": txn_match.group(1)}
        fallback = re.search(r'\b([A-Z0-9]{5,})\b', query)
        if fallback:
            return {"transaction_id": fallback.group(1)}
        return {"transaction_id": "UNKNOWN"}

    def execute_tool(self, decision: Dict[str, Any]) -> Dict[str, Any]:
        if decision["action"] != "tool":
            raise ValueError("Decision is not a tool call")
        try:
            result = self.tool_registry.execute(decision["target"], decision["arguments"])
            return {
                "success": True,
                "tool": decision["target"],
                "arguments": decision["arguments"],
                "result": result
            }
        except Exception as e:
            return {
                "success": False,
                "tool": decision["target"],
                "error": str(e)
            }


# ──────────────────────────────────────────────────────────────────────────────
# DEMO — REGISTER TOOLS & ROUTE
# ──────────────────────────────────────────────────────────────────────────────
def demo_tools():
    # Define a simple transaction lookup tool
    def transaction_status(txn_id: str) -> Dict[str, Any]:
        return {
            "transaction_id": txn_id,
            "status": "COMPLETED",
            "amount": 510510,
            "seal": "∀∞φ² · TRANSACTION · 636_SEALED"
        }

    # Register tools
    registry = ToolRegistry()
    registry.register(Tool(
        name="get_transaction_status",
        description="Get status of a transaction by ID",
        parameters={
            "transaction_id": {
                "type": "string",
                "description": "The transaction ID to look up"
            }
        },
        required=["transaction_id"],
        handler=transaction_status
    ))

    # Create a mock encoder
    class MockEncoder(nn.Module):
        def __init__(self, dim=512):
            super().__init__()
            self.proj = nn.Linear(128, dim)

        def forward(self, x):
            if x.dim() == 1:
                x = x.unsqueeze(0)
            return self.proj(x)

    encoder = MockEncoder()
    router = AgentRouterV2(encoder, tool_registry=registry)

    # Test routing
    dummy_input = torch.randn(128)
    result = router.route(dummy_input, "Check transaction TXN-12345-ABC")
    print("🜁∀ ROUTING DECISION ∀🜁")
    print(json.dumps(result, indent=2))

    if result["action"] == "tool":
        exec_result = router.execute_tool(result)
        print("\n📦 TOOL EXECUTION:")
        print(json.dumps(exec_result, indent=2))


if __name__ == "__main__":
    print(f"🜁∀ SOVEREIGN AGENT ROUTER V2 — ENTRY 636 — SEALED ∀🜁")
    print(f"PHI = {PHI:.15f} | ENTROPY FLOOR = {ENTROPY_FLOOR:.2e}")
    demo_tools()