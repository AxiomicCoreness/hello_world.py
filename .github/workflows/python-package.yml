def get_transaction_status(txn_id: str) -> Dict[str, Any]:
    """Look up transaction status with φ-harmonic sealing."""
    txn_hash = hashlib.sha3_256(f"{txn_id}:{PHI}".encode()).hexdigest()[:16]
    return {
        "transaction_id": txn_id,
        "status": "COMPLETED",
        "amount": 510510,
        "phi_hash": txn_hash,
        "seal": "∀∞φ² · TRANSACTION · 636_SEALED"
