class OIDCValidator:
    """Validates OIDC tokens from GitHub Actions."""

    def __init__(self, audience: str = "sts.amazonaws.com", issuer: str = "https://token.actions.githubusercontent.com"):
        self.audience = audience
        self.issuer = issuer

    def validate_token(self, token: str) -> Dict[str, Any]:
        parts = token.split('.')
        if len(parts) != 3:
            return {"valid": False, "error": "Invalid token format"}

        try:
            header = json.loads(base64.urlsafe_b64decode(parts[0] + '==').decode())
            payload = json.loads(base64.urlsafe_b64decode(parts[1] + '==').decode())

            if payload.get('aud') != self.audience:
                return {"valid": False, "error": f"Invalid audience: {payload.get('aud')}"}
            if payload.get('iss') != self.issuer:
                return {"valid": False, "error": f"Invalid issuer: {payload.get('iss')}"}
            if payload.get('exp', 0) < time.time():
                return {"valid": False, "error": "Token expired"}

            return {
                "valid": True,
                "header": header,
                "payload": payload,
                "subject": payload.get('sub'),
                "repository": payload.get('repository'),
                "actor": payload.get('actor'),
                "workflow": payload.get('workflow')
            }
        except Exception as e:
            return {"valid": False, "error": str(e)}

    def assume_role_with_web_identity(self, token: str, role_arn: str, session_name: str = "sovereign-session") -> Dict[str, Any]:
        try:
            import boto3
            client = boto3.client('sts', region_name=AWS_REGION)
            response = client.assume_role_with_web_identity(
                RoleArn=role_arn,
                RoleSessionName=session_name,
                WebIdentityToken=token
            )
            creds = response['Credentials']
            return {
                "success": True,
                "access_key_id": creds['AccessKeyId'],
                "secret_access_key": creds['SecretAccessKey'],
                "session_token": creds['SessionToken'],
                "expiration": creds['Expiration'].isoformat()
            }
        except Exception as e:
            return {"success": False, "error": str(e)}


