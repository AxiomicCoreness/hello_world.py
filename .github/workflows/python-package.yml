import torch
import torch.nn as nn
import json
import re
from typing import Dict, Any, Callable, List, Optional
from dataclasses import dataclass, field

@dataclass
class Tool:
    name: str
    description: str
    parameters: Dict[str, Any]
    required: List[str]
    handler: Callable

class ToolRegistry:
    def __init__(self):
        self.tools: Dict[str, Tool] = {}

    def register(self, tool: Tool):
        self.tools[tool.name] = tool

    def get_tool(self, name: str) -> Optional[Tool]:
        return self.tools.get(name)

class AgentRouterV2:
    """
    """
    def __init__(self, encoder: nn.Module, tool_registry: ToolRegistry):
        self.encoder = encoder
        self.tool_registry = tool_registry

    def route(self, input_tensor: torch.Tensor, query: str) -> Dict[str, Any]:
        """
        Determines the appropriate action based on the query pattern.
        """
        query_lower = query.lower()
        
        # Simple pattern-based routing for tool dispatch
        if "transaction" in query_lower:
            match = re.search(r"txn-\d+-[a-z]+", query_lower)
            return {"action": "tool", "tool": "get_transaction_status", "args": {"transaction_id": match.group(0) if match else "UNKNOWN"}}
        
        if "oidc role" in query_lower:
            match = re.search(r"arn:aws:iam::\d+:role/[\w-]+", query_lower)
            return {"action": "tool", "tool": "assume_oidc_role", "args": {"role_arn": match.group(0) if match else ""}}
        
        if "htmx" in query_lower:
            return {"action": "tool", "tool": "htmx_webhook_router", "args": {"query": query}}
        
        if "rotate" in query_lower:
            return {"action": "tool", "tool": "rotate_api_keys", "args": {"force": True}}
            
        return {"action": "respond", "content": "Query received but no tool matched."}

    def execute_tool(self, decision: Dict[str, Any]) -> Any:
        """
        """
        tool_name = decision.get("tool")
        args = decision.get("args", {})
        tool = self.tool_registry.get_tool(tool_name)
        if tool:
            return tool.handler(**args)
        return {"error": "Tool not found"}

