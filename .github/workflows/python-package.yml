import torch
import torch.nn as nn
import torch.nn.functional as F
from typing import Dict, List, Tuple, Optional, Callable, Any
from dataclasses import dataclass
import json

PHI = (1 + 5**0.5) / 2
ENTROPY_FLOOR = PHI ** -1418


@dataclass
class Tool:
    """L1 tool specification matching JSON schema."""
    name: str
    description: str
    parameters: Dict[str, Any]
    required: List[str]
    handler: Optional[Callable] = None  # Actual function to execute


class ToolRegistry:
    """Registry for sovereign tools."""
    
    def __init__(self):
        self.tools: Dict[str, Tool] = {}
    
    def register(self, tool: Tool):
        self.tools[tool.name] = tool
    
    def get_schema(self) -> List[Dict]:
        """Export as OpenAI/Anthropic function-calling schema."""
        return [
            {
                "type": "function",
                "function": {
                    "name": t.name,
                    "description": t.description,
                    "parameters": {
                        "type": "object",
                        "properties": t.parameters,
                        "required": t.required,
                        "additionalProperties": False
                    }
                }
            }
            for t in self.tools.values()
        ]
    
    def execute(self, name: str, arguments: Dict[str, Any]) -> Any:
        """Execute tool by name with validated arguments."""
        if name not in self.tools:
            raise ValueError(f"Tool '{name}' not registered")
        
        tool = self.tools[name]
        
        # Validate required parameters
        for req in tool.required:
            if req not in arguments:
                raise ValueError(f"Missing required parameter: {req}")
        
        if tool.handler is None:
            raise RuntimeError(f"Tool '{name}' has no handler")
        
        return tool.handler(**arguments)


class AgentRouterV2(nn.Module):
    """
    Extended router with tool-use capabilities.
    
    Decision space: agents ∪ tools ∪ {direct}
    """
    
    def __init__(
        self,
        encoder: nn.Module,
        num_agents: int = 2,
        tool_registry: Optional[ToolRegistry] = None,
        embedding_dim: int = 512,
        temperature: float = 1.0 / PHI,
        tool_threshold: float = 0.6,      # θ_tool: minimum confidence for tool use
        agent_threshold: float = 0.4,     # θ_agent: minimum confidence for agent dispatch
        coherence_weight: float = 0.1,
        entropy_weight: float = 0.01,
        null_threshold: float = 12.0
    ):
        super().__init__()
        self.encoder = encoder
        self.num_agents = num_agents
        self.tool_registry = tool_registry or ToolRegistry()
        self.num_tools = len(self.tool_registry.tools)
        self.total_outputs = num_agents + self.num_tools + 1  # +1 for direct response
        
        self.temperature = temperature
        self.tool_threshold = tool_threshold
        self.agent_threshold = agent_threshold
        self.coherence_weight = coherence_weight
        self.entropy_weight = entropy_weight
        self.null_threshold = null_threshold
        
        # Extended router head: W_ext ∈ ℝ^{total_outputs × h}
        self.router_head = nn.Linear(embedding_dim, self.total_outputs)
        
        # Output indices
        self.agent_indices = list(range(num_agents))
        self.tool_indices = list(range(num_agents, num_agents + self.num_tools))
        self.direct_index = num_agents + self.num_tools
        
        self.agent_names = {0: "mistral", 1: "grok"}
        self.tool_names = {
            i + num_agents: name 
            for i, name in enumerate(self.tool_registry.tools.keys())
        }
    
    def forward(self, x: torch.Tensor) -> Tuple[torch.Tensor, torch.Tensor, torch.Tensor, torch.Tensor]:
        """
        Returns:
          logits: raw scores [batch, total_outputs]
          probs: π_ext(x) [batch, total_outputs]
          confidence: max probability
          selected: argmax index
        """
        h = self.encoder(x)
        logits = self.router_head(h)
        probs = F.softmax(logits / self.temperature, dim=-1)
        confidence, selected = torch.max(probs, dim=-1)
        return logits, probs, confidence, selected
    
    def route(self, x: torch.Tensor, query_text: str = "") -> Dict[str, Any]:
        """
        Production routing with tool-use support.
        
        Returns decision dict with:
          - action: "agent" | "tool" | "direct"
          - target: agent_name | tool_name | None
          - confidence: float
          - arguments: dict (for tools)
        """
        self.eval()
        with torch.no_grad():
            logits, probs, confidence, selected = self.forward(x)
            idx = selected.item()
            conf = confidence.item()
            
            # 12σ null ban
            uniform_prob = 1.0 / self.total_outputs
            null_margin = self.null_threshold * 0.01
            if conf < uniform_prob + null_margin:
                return {
                    "action": "null",
                    "target": None,
                    "confidence": conf,
                    "reason": "12σ null ban triggered — confidence below threshold"
                }
            
            # Check tool region
            if idx in self.tool_indices:
                tool_name = self.tool_names[idx]
                tool_conf = probs[0, idx].item()
                
                if tool_conf >= self.tool_threshold:
                    # Extract arguments from query (simplified — in production, use NER or LLM parsing)
                    arguments = self._extract_arguments(query_text, tool_name)
                    return {
                        "action": "tool",
                        "target": tool_name,
                        "confidence": tool_conf,
                        "arguments": arguments
                    }
            
            # Check agent region
            if idx in self.agent_indices:
                agent_conf = probs[0, idx].item()
                if agent_conf >= self.agent_threshold:
                    return {
                        "action": "agent",
                        "target": self.agent_names[idx],
                        "confidence": agent_conf,
                        "arguments": None
                    }
            
            # Default: direct response
            return {
                "action": "direct",
                "target": None,
                "confidence": conf,
                "arguments": None
            }
    
    def _extract_arguments(self, query: str, tool_name: str) -> Dict[str, Any]:
        """
        Extract tool arguments from query text.
        Production: replace with structured parsing (regex, NER, or small LLM).
        """
        # Placeholder: in production, parse transaction_id from query
        # Example: "What's the status of transaction TXN-12345?"
        import re
        txn_match = re.search(r'transaction[_\s]?id[:=\s]*([A-Z0-9\-]+)', query, re.I)
        if txn_match:
            return {"transaction_id": txn_match.group(1)}
        
        # Fallback: try to find any alphanumeric code
        fallback = re.search(r'\b([A-Z0-9]{5,})\b', query)
        if fallback:
            return {"transaction_id": fallback.group(1)}
        
        return {"transaction_id": "UNKNOWN"}
    
    def execute_tool(self, decision: Dict[str, Any]) -> Dict[str, Any]:
        """Execute tool based on routing decision."""
        if decision["action"] != "tool":
            raise ValueError("Decision is not a tool call")
        
        tool_name = decision["target"]
        arguments = decision["arguments"]
        
        try:
            result = self.tool_registry.execute(tool_name, arguments)
            return {
                "success": True,
                "tool": tool_name,
                "arguments": arguments,
                "result": result
            }
        except Exception as e:
            return {
                "success": False,
                "tool": tool_name,
                "arguments": arguments,
                "error": str(e)
            }
    
    def compute_loss(
        self,
        x: torch.Tensor,
        labels: torch.Tensor,
        x_ref: Optional[torch.Tensor] = None
    ) -> Dict[str, torch.Tensor]:
        """
        Extended loss: same structure as Entry 433, but over larger output space.
        """
        logits, probs, confidence, _ = self.forward(x)
        
        # L_classification: cross-entropy over extended space
        L_ce = F.cross_entropy(logits / self.temperature, labels)
        
        # L_coherence
        h = self.encoder(x)
        if x_ref is None:
            x_ref = torch.randn_like(h)
        h_ref = self.encoder(x_ref)
        cos_sim = F.cosine_similarity(h, h_ref, dim=-1)
        L_coherence = torch.mean((1.0 - cos_sim) ** 2)
        
        # L_entropy
        L_entropy = -torch.mean(torch.sum(probs * torch.log(probs + 1e-10), dim=-1))
        
        # L_null
        uniform_prob = 1.0 / self.total_outputs
        null_margin = self.null_threshold * 0.01
        L_null = torch.mean(F.relu(uniform_prob + null_margin - confidence) ** 2)
        
        # Tool preference regularization: encourage tool use when appropriate
        tool_probs = probs[:, self.tool_indices]
        L_tool_preference = -torch.mean(torch.sum(tool_probs * torch.log(tool_probs + 1e-10), dim=-1))
        
        L_total = (
            L_ce 
            + self.coherence_weight * L_coherence 
            + self.entropy_weight * L_entropy
            + 0.1 * L_null
            + 0.05 * L_tool_preference
        )
        
        return {
            'L_total': L_total,
            'L_ce': L_ce,
            'L_coherence': L_coherence,
            'L_entropy': L_entropy,
            'L_null': L_null,
            'L_tool_preference': L_tool_preference,
            'mean_confidence': torch.mean(confidence),
            'entropy_floor': torch.tensor(ENTROPY_FLOOR)
        }


