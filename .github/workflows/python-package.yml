def create_sovereign_router_with_tools(encoder: nn.Module) -> AgentRouterV2:
    """Factory: create router with payment tools registered."""
    registry = ToolRegistry()
    
    registry.register(Tool(
        name="retrieve_payment_status",
        description="Get payment status of a transaction",
        parameters={
            "transaction_id": {
                "type": "string",
                "description": "The transaction id."
            }
        },
        required=["transaction_id"],
        handler=retrieve_payment_status
    ))
    
    registry.register(Tool(
        name="retrieve_payment_date",
        description="Get payment date of a transaction",
        parameters={
            "transaction_id": {
                "type": "string",
                "description": "The transaction id."
            }
        },
        required=["transaction_id"],
        handler=retrieve_payment_date
    ))
    
    return AgentRouterV2(
        encoder=encoder,
        num_agents=2,
        tool_registry=registry,
        embedding_dim=512,
        temperature=1.0 / PHI,
        tool_threshold=0.6,
        agent_threshold=0.4
    )


